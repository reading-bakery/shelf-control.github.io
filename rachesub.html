    <h2>Rache des SuB</h2>
  
    <div class="search-container">
        <input type="text" id="sub-search" placeholder="Suche nach Titel oder Autor:in oder ISBN...">
    </div>
   
    

    <div class="sub" id="subContainer">Lade Bücher...
    </div>

    <div class="fixed-buttons">
        
        <div class="top-button">
            <button id="backToTop" aria-label="Nach oben">
                <svg xmlns="http://www.w3.org/2000/svg" width="35" height="35" fill="currentColor" class="bi bi-arrow-bar-up" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M8 10a.5.5 0 0 0 .5-.5V3.707l2.146 2.147a.5.5 0 0 0 .708-.708l-3-3a.5.5 0 0 0-.708 0l-3 3a.5.5 0 1 0 .708.708L7.5 3.707V9.5a.5.5 0 0 0 .5.5m-7 2.5a.5.5 0 0 1 .5-.5h13a.5.5 0 0 1 0 1h-13a.5.5 0 0 1-.5-.5"/>
                </svg>
            </button>
        </div>

        <div class="zufall">
            <button id="luckyZufall" aria-label="Zufälliges Buch">
                <svg xmlns="http://www.w3.org/2000/svg" width="35" height="35" fill="currentColor" class="bi bi-dice-6" viewBox="0 0 16 16">
                    <path d="M13 1a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2zM3 0a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3V3a3 3 0 0 0-3-3z"/>
                    <path d="M5.5 4a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m8 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m0 8a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m0-4a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m-8 4a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m0-4a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0"/>
                </svg>
            </button>
        </div>

        <div class="addsub">
            <button id="addSub" aria-label="SuB hinzufügen">
                <svg xmlns="http://www.w3.org/2000/svg" width="35" height="35" fill="currentColor" class="bi bi-journal-plus" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M8 5.5a.5.5 0 0 1 .5.5v1.5H10a.5.5 0 0 1 0 1H8.5V10a.5.5 0 0 1-1 0V8.5H6a.5.5 0 0 1 0-1h1.5V6a.5.5 0 0 1 .5-.5"/>
                    <path d="M3 0h10a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2v-1h1v1a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v1H1V2a2 2 0 0 1 2-2"/>
                    <path d="M1 5v-.5a.5.5 0 0 1 1 0V5h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1zm0 3v-.5a.5.5 0 0 1 1 0V8h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1zm0 3v-.5a.5.5 0 0 1 1 0v.5h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1z"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="book-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-body">
                <img id="modal-cover" src=" " alt="Cover">
                <p id="modal-title">Titel</p>
                <p id="modal-author">Autor</p>
            </div>
            <div class="modal-footer">
                <button id="modal-confirm" class="btn-confirm">Hinzufügen</button>
                <button id="modal-cancel" class="btn-cancel">Abbrechen</button>
            </div>
        </div>
    </div>

    <div id="successAddModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Buch wurde erfolgreich hinzugefügt! 🚀</h3>
            <div>
                <button id="btnSuccessAddOk">Super!</button>
            </div>
        </div>
    </div>

<div id="subModal" class="modal">
    <div class="modal-content-2">
        <h3>Neues Buch auf den SuB legen</h3>
        <form id="addSubForm">
            <input type="number" id="isbnnumber" placeholder="ISBN eingeben">
            <input type="text" id="title" placeholder="Buchtitel eingeben" required>
            <input type="text" id="author" placeholder="Autor:in eingeben">
            <input type="number" id="pages" placeholder="Seiten insgesamt eingeben">
            

            <select id="gender" aria-label="Geschlecht auswählen">
                <option value="" disabled selected>Geschlecht wählen</option>
            </select>

            <select id="genre" aria-label="Genre auswählen">
                <option value="" disabled selected>Genre wählen</option>
            </select>

            <select id="publisher" aria-label="Verlag auswählen">
                <option value="" disabled selected>Verlag wählen</option>
            </select>

            <select id="language" aria-label="Sprache auswählen">
                <option value="" disabled selected>Originalsprache wählen</option>
            </select>

            <select id="format" aria-label="Format auswählen">
                <option value="" disabled selected>Format wählen</option>
            </select>

            <div class="file-upload">
                <label for="cover">Cover hochladen:</label>
                <input type="file" id="cover" accept="image/*">
            </div>

            

            <div class="modal-buttons">
                <button type="button" class="modal-save">Speichern</button>
                <button type="button" class="modal-cancel">Abbrechen</button>
            </div>
        </form>
    </div>
</div>
